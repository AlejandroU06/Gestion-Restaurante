<!DOCTYPE html>

<html lang="es">

<head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <title>BistroFlow - Iniciar Sesión</title>
        <!-- Fonts & Icons -->
        <link href="https://fonts.googleapis.com" rel="preconnect" />
        <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
        <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,100..900;1,100..900&amp;family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&amp;display=swap"
                rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
                rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
                rel="stylesheet" />
        <!-- Tailwind CSS -->
        <script src="js/tailwind-config.js"></script>
        <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
        <script src="https://www.google.com/recaptcha/api.js" async defer></script>
        <link rel="stylesheet" href="css/login.css" />
</head>

<body
        class="bg-background min-h-screen antialiased text-on-background selection:bg-primary-fixed selection:text-on-primary-fixed">
        <main class="flex min-h-screen w-full">
                <!-- Left Visual Area (Hidden on mobile) -->
                <section
                        class="hidden lg:flex lg:w-5/12 xl:w-1/2 relative bg-surface-variant flex-col justify-end p-12 overflow-hidden">
                        <img alt="Restaurant interior" class="absolute inset-0 w-full h-full object-cover"
                                data-alt="warm inviting softly lit upscale bistro interior with dark wooden tables amber lighting and blurred background"
                                src="https://lh3.googleusercontent.com/aida-public/AB6AXuCCsnMBRU9f4Qyms37YtLZO8zw1Va1KMHZ3yS6n7dWR7kQf-SZ0zX5bylEALyeJe83rAR8NdjF46JknY-sB-p8jGE5lyENuG0Dyy2Q7rMzUBMEYLul5DlzzM4UpUonCLtFUhJOBMgHuCGbbF-0Wa3zFY3Mq_kEz86mH5WQTWgZd17mYLIojCnOH0wf5Cpje432_tDxxuUnSkb4JWVdaBGb_HITkDY0_04S3SjrxstuT1XV2kD92xQ1Jbqx63McT7bRfw5bROZnUZ0I" />
                        <!-- Gradient Overlay for text readability -->
                        <div
                                class="absolute inset-0 bg-gradient-to-t from-surface-inverse/90 via-surface-inverse/40 to-transparent mix-blend-multiply">
                        </div>
                        <div class="relative z-10 max-w-lg mt-auto text-on-primary">
                                <h2
                                        class="font-headline-lg text-headline-lg mb-4 text-white drop-shadow-md text-balance">
                                        El sabor comienza aquí.</h2>
                                <p class="font-body-lg text-body-lg text-surface-container-low drop-shadow">Conectamos
                                        tu cocina con una experiencia inolvidable para cada cliente.
                                </p>
                        </div>
                </section>
                <!-- Right Login Area -->
                <section
                        class="w-full lg:w-7/12 xl:w-1/2 flex items-center justify-center p-8 sm:p-12 lg:p-24 relative bg-background">
                        <!-- Subtle background texture/pattern could go here, keeping it clean for now -->
                        <div class="w-full max-w-md flex flex-col">
                                <!-- Branding & Intro -->
                                <div class="mb-12">
                                        <h1 class="font-headline-display text-headline-display text-primary mb-4">
                                                BistroFlow</h1>
                                        <h2 class="font-headline-md text-headline-md text-on-surface mb-3">Iniciar
                                                Sesión</h2>
                                </div>
                                <!-- Login Form -->
                                <form id="login-form" action="#" class="flex flex-col gap-6" method="POST">
                                        <div class="flex flex-col gap-2">
                                                <label class="font-label-sm text-label-sm text-on-surface uppercase tracking-wider text-surface-tint"
                                                        for="email">Correo electrónico</label>
                                                <!-- Soft-filled input style per guidelines -->
                                                <div class="relative">
                                                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant"
                                                                data-icon="mail">mail</span>
                                                        <input class="w-full bg-surface-container rounded-DEFAULT border-none pl-12 pr-4 py-4 font-body-md text-body-md text-on-surface focus:ring-2 focus:ring-primary focus:bg-surface-container-highest transition-all outline-none placeholder:text-outline"
                                                                id="email" name="email" placeholder="nombre@ejemplo.com"
                                                                required="" type="email" />
                                                </div>
                                                <p id="email-error" class="text-error text-label-sm mt-1 hidden"></p>
                                        </div>
                                        <div class="flex flex-col gap-2">
                                                <div class="flex justify-between items-baseline">
                                                        <label class="font-label-sm text-label-sm text-on-surface uppercase tracking-wider text-surface-tint"
                                                                for="password">Contraseña</label>
                                                        <a class="font-label-sm text-label-sm text-primary hover:text-surface-tint transition-colors underline decoration-transparent hover:decoration-primary underline-offset-4"
                                                                href="#">¿Olvidó su contraseña?</a>
                                                </div>
                                                <div class="relative">
                                                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant"
                                                                data-icon="lock">lock</span>
                                                        <input class="w-full bg-surface-container rounded-DEFAULT border-none pl-12 pr-4 py-4 font-body-md text-body-md text-on-surface focus:ring-2 focus:ring-primary focus:bg-surface-container-highest transition-all outline-none placeholder:text-outline"
                                                                id="password" name="password" placeholder="••••••••"
                                                                required="" type="password" />
                                                </div>
                                                <p id="password-error" class="text-error text-label-sm mt-1 hidden"></p>
                                        </div>
                                        <!-- reCAPTCHA Widget -->
                                        <div style="display: flex; justify-content: center;" class="g-recaptcha"
                                                data-sitekey="6LexS9gsAAAAANQYk95wXV5gyWmRnljwd2infi9p"></div>
                                </form>

                                <!-- Separator -->
                                <div class="relative py-8">
                                        <div class="absolute inset-0 flex items-center" aria-hidden="true">
                                                <div class="w-full border-t border-outline-variant/30"></div>
                                        </div>
                                        <div class="relative flex justify-center text-label-sm uppercase">
                                                <span class="bg-background px-2 text-outline">O</span>
                                        </div>
                                </div>

                                <!-- Registration Link -->
                                <div class="text-center mb-8">
                                        <p class="font-body-md text-body-md text-on-surface">
                                                ¿No tienes una cuenta? <a href="registro.html"
                                                        class="text-primary font-bold hover:underline">Regístrate</a>
                                        </p>
                                </div>

                                <p id="general-error" class="text-error text-label-sm text-center hidden mb-4"></p>

                                <!-- Login Button (Linked to form) -->
                                <button id="login-btn" form="login-form"
                                        class="w-full bg-primary hover:bg-surface-tint text-on-primary font-label-md text-label-md py-4 px-6 rounded-lg transition-all duration-200 flex justify-center items-center gap-2 shadow-sm hover:shadow-[0_8px_20px_rgba(159,62,7,0.2)] hover:-translate-y-0.5 active:translate-y-0 disabled:opacity-70 disabled:cursor-not-allowed disabled:hover:translate-y-0"
                                        type="submit">
                                        <span id="btn-text">Ingresar</span>
                                        <span id="btn-icon" class="material-symbols-outlined text-[20px]"
                                                data-icon="arrow_forward">arrow_forward</span>
                                        <span id="btn-spinner"
                                                class="material-symbols-outlined text-[20px] animate-spin hidden"
                                                data-icon="progress_activity">progress_activity</span>
                                </button>

                                <!-- Footer / Meta -->
                                <div class="mt-24 text-center">
                                        <p class="font-label-sm text-label-sm text-outline">
                                                © 2024 BistroFlow Hospitality Systems. Todos los derechos reservados.
                                        </p>
                                </div>
                        </div>
                </section>
        </main>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="js/login.js"></script>
</body>

</html>
