<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú - BistroFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#C05621',
                        'primary-container': '#9C421A',
                        background: '#FAF9F6',
                        surface: '#FDFCF0',
                        'on-surface': '#2D3748',
                        'stone-500': '#718096'
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        serif: ['Noto Serif', 'serif']
                    }
                }
            }
        }
    </script>
    <style>
        .bg-pattern {
            background-color: #FAF9F6;
            background-image: radial-gradient(#C0562110 1px, transparent 1px);
            background-size: 32px 32px;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .font-headline {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700;
        }
    </style>
    <script src="../auth-helper.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-background font-sans text-stone-900">
    <!-- Header -->
    <header class="sticky top-0 z-40 w-full bg-white/80 backdrop-blur-md border-b border-stone-200 px-6 py-4">
        <div class="max-w-screen-2xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-12">
                <a href="../home_cliente/code.html" class="flex items-center gap-2 group">
                    <div
                        class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center rotate-3 group-hover:rotate-6 transition-transform">
                        <span class="material-symbols-outlined text-white"
                            style="font-variation-settings: 'FILL' 1">restaurant</span>
                    </div>
                    <span class="font-serif font-bold text-2xl tracking-tight text-stone-900">BistroFlow</span>
                </a>
                <nav class="hidden md:flex gap-8">
                    <a href="../home_cliente/code.html"
                        class="text-stone-500 hover:text-primary font-serif transition-colors">Inicio</a>
                </nav>
            </div>
            <div class="flex items-center gap-6">
                <p class="text-sm font-bold text-stone-800">Hola, <span id="user-name"
                        class="text-primary">Invitado</span></p>
                <div class="relative">
                    <button id="cart-button"
                        class="material-symbols-outlined p-2 text-stone-600 hover:bg-stone-100 rounded-full">shopping_cart</button>
                    <span id="cart-badge"
                        class="absolute top-0 right-0 bg-primary text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full hidden">0</span>

                    <!-- Cart Preview Dropdown -->
                    <div id="cart-preview"
                        class="absolute top-full right-0 mt-2 w-80 bg-white rounded-xl shadow-2xl border border-stone-100 hidden z-50 overflow-hidden">
                        <div class="p-4 border-b border-stone-100 flex justify-between items-center bg-stone-50/50">
                            <h3 class="font-bold text-sm">Tu Pedido</h3>
                            <button id="close-cart"
                                class="material-symbols-outlined text-stone-400 hover:text-stone-600 text-sm">close</button>
                        </div>
                        <div id="cart-items" class="max-h-96 overflow-y-auto p-4 space-y-4"></div>
                        <div class="p-4 bg-stone-50 border-t border-stone-100 space-y-3">
                            <div class="flex justify-between items-center font-bold">
                                <span class="text-stone-500 text-sm">Total</span>
                                <span id="cart-total" class="text-primary">$0.00</span>
                            </div>
                            <button
                                class="w-full bg-primary hover:bg-primary-container text-white py-2.5 rounded-lg font-bold transition-colors">Confirmar
                                Pedido</button>
                            <button id="clear-cart"
                                class="w-full text-stone-400 hover:text-red-500 text-xs font-semibold">Vaciar
                                carrito</button>
                        </div>
                    </div>
                </div>
                <button id="logout-button"
                    class="flex items-center gap-2 bg-stone-100 hover:bg-stone-200 text-stone-700 px-4 py-2 rounded-lg font-semibold transition-all">
                    <span class="material-symbols-outlined text-sm">logout</span> Salir
                </button>
            </div>
        </div>
    </header>

    <main class="min-h-screen bg-pattern pt-8 pb-20">
        <div class="max-w-screen-2xl mx-auto px-6">
            <!-- Filter Section -->
            <section class="mb-12">
                <div id="categories-container" class="flex items-center overflow-x-auto pb-4 no-scrollbar gap-4">
                    <div class="flex gap-3">
                        <!-- Categorías dinámicas aquí -->
                        <div class="animate-pulse flex gap-3">
                            <div class="h-10 w-32 bg-stone-200 rounded-full"></div>
                            <div class="h-10 w-32 bg-stone-200 rounded-full"></div>
                        </div>
                    </div>
                </div>
            </section>

            <div class="mb-10">
                <h2 id="category-title" class="font-serif font-bold text-5xl text-on-surface">Menú Completo</h2>
                <p class="text-stone-500 mt-3 text-lg">Explora nuestra selección artesanal preparada al momento.</p>
            </div>

            <!-- Product Grid -->
            <div id="products-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                <!-- Productos dinámicos aquí -->
                <div class="col-span-full text-center py-20 text-stone-400">
                    <span class="material-symbols-outlined text-4xl animate-spin mb-4">progress_activity</span>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js" defer></script>
</body>

</html>
