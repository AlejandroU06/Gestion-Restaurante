<!DOCTYPE html>
<html class="light" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>BistroFlow - Gestión de Categorías</title>
    <script src="js/tailwind-config.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@600;700&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/categorias.css" />
    <script src="js/main.js"></script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body class="bg-background text-on-background font-sans antialiased flex h-screen overflow-hidden">

    <div id="sidebar-container"></div>

    <!-- Main Content Area -->
    <main
        class="flex-1 ml-0 md:ml-64 bg-[#fdfbf7] h-screen overflow-y-auto relative mt-[64px] md:mt-0 px-4 md:px-10 py-6 md:py-10">

        <div class="max-w-[1200px] mx-auto space-y-8">
            <!-- Header Section -->
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                <div>
                    <h2 class="font-serif text-[28px] md:text-[32px] font-bold text-[#2d2a26] mb-1 leading-none">Gestión
                        de Categorías</h2>
                    <p class="font-sans text-[14px] text-[#6b625b]">Administra las secciones de tu menú para una mejor
                        organización.</p>
                </div>
                <div class="flex flex-wrap gap-4 mt-2 w-full sm:w-auto">
                    <div class="relative flex-1 sm:flex-none">
                        <span
                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-[#8c827a] text-[18px]">search</span>
                        <input id="search-category" type="text" placeholder="Buscar categorías..."
                            class="w-full sm:w-64 pl-10 pr-4 py-2 bg-white border border-[#e6e2de] rounded-md focus:outline-none focus:border-[#b84a1e] transition-colors text-[13px] text-[#2d2a26] placeholder:text-[#8c827a] shadow-sm">
                    </div>
                    <button
                        class="px-5 py-2 bg-white border border-[#e6e2de] rounded-md text-[13px] font-bold text-[#6b625b] hover:bg-[#fffcf8] transition-colors flex items-center gap-2 shadow-sm">
                        <span class="material-symbols-outlined text-[17px]">filter_list</span> Filtrar
                    </button>
                </div>
            </div>

            <!-- Bento Grid Content -->
            <div id="categories-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Data will be loaded dynamically here -->
            </div>
        </div>

    </main>

    <!-- Category Modal -->
    <div id="category-modal"
        class="fixed inset-0 bg-black/40 hidden z-50 flex items-center justify-center backdrop-blur-sm p-4">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-md flex flex-col overflow-hidden">
            <div class="p-5 border-b border-[#e6e2de] flex justify-between items-center">
                <h3 id="modal-title" class="font-serif text-[18px] font-bold text-[#2d2a26]">Nueva Categoría</h3>
                <button id="close-category-modal" class="text-[#8c827a] hover:text-red-500 transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>

            <form id="category-form" class="p-6 flex flex-col gap-4">
                <input type="hidden" id="category-id">

                <div>
                    <label class="block text-[12px] font-bold text-[#2d2a26] mb-1">Nombre de la Categoría</label>
                    <input type="text" id="category-name" required placeholder="Ej. Entradas, Postres..."
                        class="w-full bg-[#fdfbf7] border border-[#e6e2de] rounded-md py-2 px-3 focus:outline-none focus:border-[#b84a1e] transition-colors text-[13px]">
                </div>

                <div>
                    <label class="block text-[12px] font-bold text-[#2d2a26] mb-1">Descripción</label>
                    <textarea id="category-desc" rows="3" placeholder="Breve descripción de esta sección..."
                        class="w-full bg-[#fdfbf7] border border-[#e6e2de] rounded-md py-2 px-3 focus:outline-none focus:border-[#b84a1e] transition-colors text-[13px] resize-none"></textarea>
                </div>

                <div>
                    <label class="block text-[12px] font-bold text-[#2d2a26] mb-1">URL de la Imagen</label>
                    <input type="url" id="category-image" placeholder="https://ejemplo.com/imagen.jpg"
                        class="w-full bg-[#fdfbf7] border border-[#e6e2de] rounded-md py-2 px-3 focus:outline-none focus:border-[#b84a1e] transition-colors text-[13px]">
                </div>

                <div>
                    <label class="block text-[12px] font-bold text-[#2d2a26] mb-1">Estado</label>
                    <select id="category-status" required
                        class="w-full bg-[#fdfbf7] border border-[#e6e2de] rounded-md py-2 px-3 focus:outline-none focus:border-[#b84a1e] transition-colors text-[13px] appearance-none cursor-pointer">
                        <option value=true>Activo</option>
                        <option value=false>Inactivo</option>
                    </select>
                </div>
            </form>

            <div class="p-5 border-t border-[#e6e2de] flex justify-end gap-3 bg-[#fdfbf7]">
                <button type="button" id="cancel-category-modal"
                    class="px-4 py-2 text-[13px] font-bold text-[#6b625b] hover:bg-[#e6e2de] rounded-md transition-colors">Cancelar</button>
                <button type="submit" form="category-form"
                    class="px-4 py-2 bg-[#b84a1e] text-white rounded-md text-[13px] font-bold shadow-sm hover:opacity-90 transition-opacity">Guardar
                    Categoría</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/categorias.js"></script>
</body>

</html>
